<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Great Vibes</title>
  </head>
  <body>
    <div class="container">
      <!-- Header / Navbar -->
      <header class="header">
        <nav class="nav-bar">
          <a class="nav-logo" href="">
            <h2 class="logo-text">☕ Great Vibes</h2>
          </a>
          <ul class="nav-menu">
            <button id="menu-close-button" type="button" class="fas fa-times"></button>
            <li class="nave-item">
              <a class="nav-link" href="">Home</a>
            </li>
            <li class="nave-item">
              <a class="nav-link" href="">About</a>
            </li>
            <li class="nave-item">
              <a class="nav-link" href="">Menu</a>
            </li>
            <li class="nave-item">
              <a class="nav-link" href="">Testimonials</a>
            </li>
            <li class="nave-item">
              <a class="nav-link" href="">Contact</a>
            </li>
          </ul>

          <button type="button" id="menu-open-button" class="fas fa-bars"></button>
        </nav>
      </header>

      <main>
        <section class="hero-section">
          <div class="section-container">
            <div class="hero-details">
              <h2 class="title">Best Coffee</h2>
              <h3 class="subtitle">
                Make your day great with our special coffee <span><img class="coffee-cup" src="img/coffee cup.png" alt=""></span>
              </h3>
              <p class="description">
                Welcome to our coffee Paradise, where every bean tells a story
                and every cup sparks joy ✨
              </p>
              <div class="buttons">
                <a href="" class="button order-now"> Order Now </a>
                <a href="" class="button contact-us"> Contact Us </a>
              </div>
            </div>
            <div class="hero-image-wrapper">
              <img
                class="img"
                src="img/delicious coffee to go cup.png"
                alt=""
                class="hero-image"
              />
            </div>
          </div>
        </section>
        <section></section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
